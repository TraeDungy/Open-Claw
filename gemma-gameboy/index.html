<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEMMA BOY</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gb-shell: #8b8b73;
    --gb-shell-dark: #6b6b5a;
    --gb-shell-light: #a0a08d;
    --gb-screen-frame: #3d3d3d;
    --gb-screen-bg: #0f380f;
    --gb-screen-light: #306230;
    --gb-screen-lighter: #8bac0f;
    --gb-screen-lightest: #9bbc0f;
    --gb-purple: #2c1b47;
    --gb-dpad: #2a2a2a;
    --gb-btn-a: #8b1a4a;
    --gb-btn-b: #8b1a4a;
    --gb-accent: #ff004d;
    --gb-gold: #ffd700;
    --gb-neon-green: #39ff14;
  }

  body {
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
  }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  /* Floating pixels background */
  .pixel-rain {
    position: fixed;
    inset: 0;
    z-index: -1;
    overflow: hidden;
  }
  .pixel-rain span {
    position: absolute;
    width: 4px;
    height: 4px;
    background: var(--gb-neon-green);
    opacity: 0.15;
    animation: rain linear infinite;
  }
  @keyframes rain {
    0% { transform: translateY(-10px); opacity: 0; }
    10% { opacity: 0.15; }
    90% { opacity: 0.15; }
    100% { transform: translateY(100vh); opacity: 0; }
  }

  /* === GAMEBOY SHELL === */
  .gameboy {
    width: 420px;
    background: linear-gradient(180deg, var(--gb-shell-light) 0%, var(--gb-shell) 30%, var(--gb-shell-dark) 100%);
    border-radius: 20px 20px 20px 80px;
    padding: 20px;
    box-shadow:
      8px 8px 0 rgba(0,0,0,0.3),
      inset 0 2px 0 rgba(255,255,255,0.2),
      inset 0 -2px 0 rgba(0,0,0,0.2),
      0 0 60px rgba(57,255,20,0.1);
    position: relative;
    user-select: none;
  }

  /* Top ridge lines */
  .gameboy::before {
    content: '';
    position: absolute;
    top: 8px; left: 30px; right: 30px;
    height: 3px;
    background: repeating-linear-gradient(90deg, var(--gb-shell-dark) 0px, var(--gb-shell-dark) 3px, transparent 3px, transparent 6px);
    border-radius: 2px;
  }

  /* Power LED */
  .power-led {
    position: absolute;
    top: 62px;
    left: 22px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .power-led .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #ff0040;
    box-shadow: 0 0 8px #ff0040, 0 0 20px #ff004088;
    animation: pulse-led 2s ease-in-out infinite;
  }
  .power-led .label {
    font-size: 5px;
    color: var(--gb-shell-dark);
    letter-spacing: 1px;
  }
  @keyframes pulse-led {
    0%, 100% { opacity: 1; box-shadow: 0 0 8px #ff0040, 0 0 20px #ff004088; }
    50% { opacity: 0.6; box-shadow: 0 0 4px #ff0040; }
  }

  /* === SCREEN AREA === */
  .screen-housing {
    background: var(--gb-screen-frame);
    border-radius: 12px;
    padding: 12px 12px 20px;
    margin-bottom: 16px;
    position: relative;
  }
  .screen-housing::before {
    content: 'GEMMA BOY';
    position: absolute;
    top: -2px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 6px;
    color: var(--gb-shell-light);
    letter-spacing: 3px;
  }

  .screen-bezel {
    background: #1a1a2e;
    border-radius: 4px;
    padding: 3px;
    border: 2px solid #0a0a15;
    box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
  }

  .screen {
    background: var(--gb-screen-bg);
    border-radius: 2px;
    height: 320px;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 10px;
    position: relative;
    image-rendering: pixelated;
    scrollbar-width: none;
  }
  .screen::-webkit-scrollbar { display: none; }

  /* Screen glow */
  .screen::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.3) 100%);
    pointer-events: none;
    z-index: 1;
  }

  /* Battery label */
  .screen-housing::after {
    content: 'POWERED BY GEMMA';
    position: absolute;
    bottom: 5px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 5px;
    color: #666;
    letter-spacing: 2px;
  }

  /* === CHAT MESSAGES === */
  .msg {
    margin-bottom: 8px;
    font-family: 'VT323', monospace;
    font-size: 16px;
    line-height: 1.4;
    position: relative;
    z-index: 2;
    word-break: break-word;
  }
  .msg.user {
    color: var(--gb-screen-lightest);
  }
  .msg.user::before {
    content: '> ';
    color: var(--gb-screen-lighter);
  }
  .msg.assistant {
    color: var(--gb-screen-lighter);
    padding-left: 4px;
    border-left: 2px solid var(--gb-screen-light);
  }
  .msg.system {
    color: var(--gb-screen-light);
    font-size: 12px;
    text-align: center;
    animation: blink-msg 1s steps(2) 3;
  }
  @keyframes blink-msg {
    50% { opacity: 0; }
  }

  .cursor-blink {
    display: inline-block;
    width: 8px;
    height: 14px;
    background: var(--gb-screen-lighter);
    animation: blink 0.6s steps(2) infinite;
    vertical-align: middle;
    margin-left: 2px;
  }
  @keyframes blink {
    50% { opacity: 0; }
  }

  /* === CONTROLS === */
  .controls {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 10px 5px;
    min-height: 130px;
  }

  /* D-PAD */
  .dpad {
    width: 100px;
    height: 100px;
    position: relative;
  }
  .dpad-center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 30px;
    height: 30px;
    background: var(--gb-dpad);
    border-radius: 50%;
    z-index: 3;
  }
  .dpad-btn {
    position: absolute;
    background: var(--gb-dpad);
    border: none;
    cursor: pointer;
    transition: all 0.1s;
  }
  .dpad-btn:active {
    filter: brightness(0.7);
    transform: scale(0.95);
  }
  .dpad-up, .dpad-down {
    width: 30px;
    height: 35px;
    left: 50%;
    transform: translateX(-50%);
    border-radius: 4px;
  }
  .dpad-up { top: 0; border-radius: 4px 4px 0 0; }
  .dpad-down { bottom: 0; border-radius: 0 0 4px 4px; }
  .dpad-left, .dpad-right {
    width: 35px;
    height: 30px;
    top: 50%;
    transform: translateY(-50%);
    border-radius: 4px;
  }
  .dpad-left { left: 0; border-radius: 4px 0 0 4px; }
  .dpad-right { right: 0; border-radius: 0 4px 4px 0; }

  /* A/B BUTTONS */
  .ab-buttons {
    display: flex;
    gap: 12px;
    align-items: center;
    transform: rotate(-25deg);
    margin-top: 10px;
  }
  .btn-ab {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: none;
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    color: #fff;
    cursor: pointer;
    box-shadow:
      0 4px 0 rgba(0,0,0,0.4),
      inset 0 1px 0 rgba(255,255,255,0.2);
    transition: all 0.1s;
  }
  .btn-ab:active {
    box-shadow: 0 1px 0 rgba(0,0,0,0.4);
    transform: translateY(3px);
  }
  .btn-a {
    background: var(--gb-btn-a);
  }
  .btn-b {
    background: var(--gb-btn-b);
    margin-top: 20px;
  }
  .btn-ab-label {
    display: block;
    font-size: 6px;
    color: var(--gb-shell-dark);
    text-align: center;
    margin-top: 4px;
    transform: rotate(25deg);
  }

  /* SELECT/START */
  .menu-buttons {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin-top: 4px;
  }
  .btn-menu {
    width: 40px;
    height: 12px;
    background: var(--gb-shell-dark);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.1s;
  }
  .btn-menu:active {
    transform: scale(0.9);
    background: #555;
  }
  .btn-menu-wrap {
    text-align: center;
  }
  .btn-menu-label {
    font-size: 5px;
    color: var(--gb-shell-dark);
    letter-spacing: 1px;
    margin-top: 3px;
    display: block;
  }

  /* === INPUT AREA === */
  .input-area {
    display: flex;
    gap: 6px;
    padding: 8px 5px;
  }
  .input-area input {
    flex: 1;
    background: var(--gb-screen-bg);
    border: 2px solid var(--gb-screen-light);
    border-radius: 4px;
    padding: 8px 10px;
    font-family: 'VT323', monospace;
    font-size: 16px;
    color: var(--gb-screen-lightest);
    outline: none;
    caret-color: var(--gb-screen-lighter);
  }
  .input-area input::placeholder {
    color: var(--gb-screen-light);
    opacity: 0.6;
  }
  .input-area input:focus {
    border-color: var(--gb-screen-lighter);
    box-shadow: 0 0 10px rgba(139,172,15,0.3);
  }
  .send-btn {
    background: var(--gb-accent);
    border: none;
    border-radius: 4px;
    padding: 8px 12px;
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: #fff;
    cursor: pointer;
    box-shadow: 0 3px 0 #a0003a;
    transition: all 0.1s;
    white-space: nowrap;
  }
  .send-btn:active {
    box-shadow: 0 1px 0 #a0003a;
    transform: translateY(2px);
  }
  .send-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* === STATUS BAR === */
  .status-bar {
    display: flex;
    justify-content: space-between;
    padding: 4px 8px;
    font-size: 6px;
    color: var(--gb-shell-dark);
    letter-spacing: 1px;
  }
  .status-bar .model-name {
    color: var(--gb-accent);
  }

  /* === SPEAKER GRILLE === */
  .speaker {
    position: absolute;
    bottom: 20px;
    right: 25px;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 4px;
    transform: rotate(-25deg);
  }
  .speaker-hole {
    width: 5px;
    height: 5px;
    background: var(--gb-shell-dark);
    border-radius: 50%;
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.5);
  }

  /* === BOOT SCREEN === */
  .boot-screen {
    position: absolute;
    inset: 0;
    background: var(--gb-screen-bg);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
    border-radius: 2px;
    animation: boot-fade 3s ease-out forwards;
  }
  @keyframes boot-fade {
    0%, 80% { opacity: 1; }
    100% { opacity: 0; pointer-events: none; }
  }
  .boot-logo {
    font-size: 10px;
    color: var(--gb-screen-lightest);
    text-align: center;
    line-height: 2;
    animation: boot-drop 1s ease-out;
  }
  @keyframes boot-drop {
    0% { transform: translateY(-40px); opacity: 0; }
    60% { transform: translateY(4px); }
    100% { transform: translateY(0); opacity: 1; }
  }
  .boot-bar {
    width: 120px;
    height: 8px;
    background: var(--gb-screen-light);
    margin-top: 16px;
    border-radius: 2px;
    overflow: hidden;
  }
  .boot-bar-fill {
    height: 100%;
    background: var(--gb-screen-lightest);
    animation: boot-load 2.5s steps(12) forwards;
  }
  @keyframes boot-load {
    0% { width: 0%; }
    100% { width: 100%; }
  }

  /* === RESPONSIVE === */
  @media (max-width: 480px) {
    .gameboy {
      width: 100%;
      border-radius: 0;
      min-height: 100vh;
    }
    .screen { height: 250px; }
  }

  /* Thinking animation */
  .thinking-dots span {
    animation: dot-bounce 1.2s steps(2) infinite;
    display: inline-block;
  }
  .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dot-bounce {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }
</style>
</head>
<body>

<!-- Pixel rain background -->
<div class="pixel-rain" id="pixelRain"></div>

<!-- GAMEBOY -->
<div class="gameboy">
  <div class="power-led">
    <div class="dot" id="powerLed"></div>
    <span class="label">POWER</span>
  </div>

  <div class="screen-housing">
    <div class="screen-bezel">
      <div class="screen" id="screen">
        <!-- Boot animation -->
        <div class="boot-screen" id="bootScreen">
          <div class="boot-logo">
            GEMMA<br>BOY
          </div>
          <div class="boot-bar"><div class="boot-bar-fill"></div></div>
        </div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <input type="text" id="chatInput" placeholder="TALK TO GEMMA..." autocomplete="off" />
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">A ></button>
  </div>

  <div class="controls">
    <div class="dpad">
      <button class="dpad-btn dpad-up" onclick="scrollChat(-80)" title="Scroll up"></button>
      <button class="dpad-btn dpad-down" onclick="scrollChat(80)" title="Scroll down"></button>
      <button class="dpad-btn dpad-left" onclick="prevPreset()" title="Previous preset"></button>
      <button class="dpad-btn dpad-right" onclick="nextPreset()" title="Next preset"></button>
      <div class="dpad-center"></div>
    </div>
    <div class="ab-buttons">
      <div>
        <button class="btn-ab btn-a" onclick="sendMessage()">A</button>
        <span class="btn-ab-label">SEND</span>
      </div>
      <div>
        <button class="btn-ab btn-b" onclick="clearChat()">B</button>
        <span class="btn-ab-label">CLEAR</span>
      </div>
    </div>
  </div>

  <div class="menu-buttons">
    <div class="btn-menu-wrap">
      <button class="btn-menu" onclick="toggleTheme()"></button>
      <span class="btn-menu-label">SELECT</span>
    </div>
    <div class="btn-menu-wrap">
      <button class="btn-menu" onclick="showHelp()"></button>
      <span class="btn-menu-label">START</span>
    </div>
  </div>

  <div class="status-bar">
    <span id="machineLabel">MACHINE: ---</span>
    <span>MODEL: <span class="model-name" id="modelLabel">---</span></span>
  </div>

  <!-- Speaker grille -->
  <div class="speaker" id="speaker"></div>
</div>

<!-- AUDIO -->
<audio id="sfxSend" preload="auto">
  <source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=" type="audio/wav">
</audio>

<script>
  // === CONFIG ===
  let MODEL = 'gemma3:4b';
  let MACHINE = '???';
  const messages = [];
  let isGenerating = false;
  let currentTheme = 0;

  const themes = [
    { name: 'CLASSIC', bg: '#0f380f', light: '#306230', lighter: '#8bac0f', lightest: '#9bbc0f' },
    { name: 'POCKET', bg: '#1a1a2e', light: '#2d2d5e', lighter: '#e0e0ff', lightest: '#ffffff' },
    { name: 'COLOR', bg: '#1b0533', light: '#4a1c6b', lighter: '#ff6ec7', lightest: '#ff004d' },
    { name: 'NEON',  bg: '#0a0a0a', light: '#003300', lighter: '#39ff14', lightest: '#00ff41' },
  ];

  const presets = [
    'Tell me a fun fact',
    'Write a haiku about AI',
    'Explain like I\'m 5: quantum physics',
    'What\'s the meaning of life?',
    'Tell me a joke',
    'Describe a dream you\'d have',
  ];
  let presetIdx = 0;

  // === INIT ===
  window.addEventListener('DOMContentLoaded', async () => {
    buildSpeaker();
    buildPixelRain();

    try {
      const res = await fetch('/config');
      const cfg = await res.json();
      MODEL = cfg.model;
      MACHINE = cfg.machine;
      document.getElementById('modelLabel').textContent = MODEL;
      document.getElementById('machineLabel').textContent = `MACHINE: ${MACHINE}`;
    } catch {
      document.getElementById('modelLabel').textContent = MODEL;
    }

    setTimeout(() => {
      addSystemMsg(`GEMMA BOY v1.0 -- ${MACHINE}`);
      addSystemMsg('PRESS A OR ENTER TO CHAT');
      document.getElementById('bootScreen').remove();
      document.getElementById('chatInput').focus();
    }, 3000);
  });

  // === KEYBOARD ===
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // === SEND MESSAGE ===
  async function sendMessage() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text || isGenerating) return;

    isGenerating = true;
    document.getElementById('sendBtn').disabled = true;
    input.value = '';

    // Add user message
    addMsg('user', text);
    messages.push({ role: 'user', content: text });

    // Add thinking indicator
    const thinkingEl = addMsg('assistant', '');
    thinkingEl.innerHTML = '<span class="thinking-dots"><span>.</span><span>.</span><span>.</span></span>';

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages }),
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let fullResponse = '';
      thinkingEl.textContent = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const text = decoder.decode(value);
        const lines = text.split('\n').filter(l => l.startsWith('data: '));

        for (const line of lines) {
          try {
            const data = JSON.parse(line.slice(6));
            if (data.token) {
              fullResponse += data.token;
              thinkingEl.textContent = fullResponse;
              scrollToBottom();
            }
            if (data.error) {
              thinkingEl.textContent = `ERR: ${data.error}`;
            }
          } catch {}
        }
      }

      if (fullResponse) {
        messages.push({ role: 'assistant', content: fullResponse });
      }
    } catch (e) {
      thinkingEl.textContent = `CONNECTION ERROR: ${e.message}`;
    }

    isGenerating = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('chatInput').focus();
  }

  // === UI HELPERS ===
  function addMsg(role, text) {
    const screen = document.getElementById('screen');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.textContent = text;
    screen.appendChild(div);
    scrollToBottom();
    return div;
  }

  function addSystemMsg(text) {
    addMsg('system', text);
  }

  function scrollToBottom() {
    const screen = document.getElementById('screen');
    screen.scrollTop = screen.scrollHeight;
  }

  function scrollChat(delta) {
    document.getElementById('screen').scrollBy({ top: delta, behavior: 'smooth' });
  }

  function clearChat() {
    const screen = document.getElementById('screen');
    screen.innerHTML = '';
    messages.length = 0;
    addSystemMsg('MEMORY CLEARED');
    addSystemMsg('READY PLAYER ONE');
  }

  function prevPreset() {
    presetIdx = (presetIdx - 1 + presets.length) % presets.length;
    document.getElementById('chatInput').value = presets[presetIdx];
  }

  function nextPreset() {
    presetIdx = (presetIdx + 1) % presets.length;
    document.getElementById('chatInput').value = presets[presetIdx];
  }

  function showHelp() {
    addSystemMsg('--- CONTROLS ---');
    addSystemMsg('A / ENTER = SEND');
    addSystemMsg('B = CLEAR CHAT');
    addSystemMsg('D-PAD L/R = PRESETS');
    addSystemMsg('D-PAD U/D = SCROLL');
    addSystemMsg('SELECT = THEME');
    addSystemMsg('START = THIS HELP');
  }

  function toggleTheme() {
    currentTheme = (currentTheme + 1) % themes.length;
    const t = themes[currentTheme];
    const root = document.documentElement.style;
    root.setProperty('--gb-screen-bg', t.bg);
    root.setProperty('--gb-screen-light', t.light);
    root.setProperty('--gb-screen-lighter', t.lighter);
    root.setProperty('--gb-screen-lightest', t.lightest);
    addSystemMsg(`THEME: ${t.name}`);
  }

  // === BUILD DECORATIVE ELEMENTS ===
  function buildSpeaker() {
    const speaker = document.getElementById('speaker');
    for (let i = 0; i < 18; i++) {
      const hole = document.createElement('div');
      hole.className = 'speaker-hole';
      speaker.appendChild(hole);
    }
  }

  function buildPixelRain() {
    const rain = document.getElementById('pixelRain');
    for (let i = 0; i < 40; i++) {
      const span = document.createElement('span');
      span.style.left = Math.random() * 100 + '%';
      span.style.animationDuration = (3 + Math.random() * 7) + 's';
      span.style.animationDelay = Math.random() * 5 + 's';
      rain.appendChild(span);
    }
  }
</script>
</body>
</html>
